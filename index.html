<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soifer Family McDonald's Employee Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --mcdonalds-red: #DA291C;
            --mcdonalds-yellow: #FFC72C;
            --mcdonalds-dark-red: #BF0811;
            --mcdonalds-brown: #27251F;
            --mcdonalds-light-bg: #FFF9E6;
            --mcdonalds-warm-white: #FFFDF5;
        }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: linear-gradient(135deg, #DA291C 0%, #BF0811 50%, #8B0000 100%); height: 100vh; height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .chat-container { width: 100%; max-width: 520px; height: 100vh; height: 100dvh; background: var(--mcdonalds-warm-white); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 768px) { .chat-container { height: 90vh; max-height: 800px; border-radius: 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); } }
        .chat-header { background: linear-gradient(135deg, var(--mcdonalds-red) 0%, var(--mcdonalds-dark-red) 100%); padding: 14px 18px; display: flex; align-items: center; gap: 13px; box-shadow: 0 3px 12px rgba(150,0,0,0.35); }
        .header-logo { width: 54px; height: 54px; background: var(--mcdonalds-yellow); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 14px; background: linear-gradient(180deg, var(--mcdonalds-light-bg) 0%, var(--mcdonalds-warm-white) 100%); }
        .message { display: flex; gap: 9px; max-width: 90%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .message.bot .avatar { background: var(--mcdonalds-yellow); }
        .message.user .avatar { background: var(--mcdonalds-red); }
        .bubble { padding: 11px 15px; font-size: 14.5px; border-radius: 18px; }
        .message.bot .bubble { background: #fff; color: var(--mcdonalds-brown); }
        .message.user .bubble { background: var(--mcdonalds-red); color: #fff; }
        .input-area { padding: 10px 14px; background: #fff; border-top: 1px solid rgba(0,0,0,.06); }
        .input-row { display: flex; align-items: flex-end; gap: 9px; background: #F5F5F5; border-radius: 28px; padding: 6px 17px; }
        textarea#msg { flex: 1; border: none; background: transparent; padding: 8px 0; resize: none; outline: none; }
        .send-btn { width: 43px; height: 43px; border-radius: 50%; border: none; background: var(--mcdonalds-red); color: #fff; cursor: pointer; }
        .conn-banner { padding: 9px; text-align: center; font-size: 12px; display: none; }
        .conn-banner.error { display: block; background: #FEF2F2; color: #991B1B; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-logo">🍔</div>
        <div class="header-info">
            <div style="color:#fff; font-weight:800;">Soifer Family McDonald's</div>
            <div style="color:rgba(255,255,255,0.8);">Employee Assistant</div>
        </div>
    </div>
    <div class="conn-banner" id="connBanner"></div>
    <div class="chat-messages" id="msgs">
        <div class="message bot"><div class="avatar">🤖</div><div class="bubble">Hi! How can I help you today?</div></div>
    </div>
    <div class="input-area">
        <div class="input-row">
            <textarea id="msg" rows="1" placeholder="Type your question…"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
let busy = false;
const msgsEl = document.getElementById('msgs');
const msgInput = document.getElementById('msg');
const banner = document.getElementById('connBanner');

function addMsg(text, role) {
    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;
    wrap.innerHTML = `<div class="avatar">${role==='bot'?'🤖':'👤'}</div><div class="bubble">${text}</div>`;
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function sendMessage() {
    const question = msgInput.value.trim();
    if (!question || busy) return;

    addMsg(question, 'user');
    msgInput.value = '';
    busy = true;
    banner.style.display = 'none';

    try {
        // Production URL for the chatbot webhook
        const baseUrl = 'https://ecupirate99-n8n-free.hf.space/webhook/93778624-c756-4133-b169-6768f49dd513';
        const targetUrl = `${baseUrl}?chatInput=${encodeURIComponent(question)}`;

        const response = await fetch(targetUrl, { method: 'GET' });

        const rawText = await response.text();

        if (!response.ok) {
            throw new Error(`Server error (${response.status}): ${rawText || 'no details returned'}`);
        }

        if (!rawText) {
            throw new Error('Webhook returned an empty response. Check that your n8n workflow ends in a "Respond to Webhook" node.');
        }

        // Parse result
        const data = JSON.parse(rawText);
        const reply = data.output || data.text || rawText;
        addMsg(reply, 'bot');

    } catch (err) {
        banner.textContent = '❌ ' + err.message;
        banner.className = 'conn-banner error';
        banner.style.display = 'block';
    } finally {
        busy = false;
    }
}
</script>
</body>
</html>
