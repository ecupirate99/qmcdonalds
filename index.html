<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Assistant</title>
    <style>
        /* CSS: Keeps your chat looking pretty */
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        #msgsEl { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .message { margin: 10px 0; }
        .bubble { padding: 10px; border-radius: 10px; display: inline-block; }
        .user { text-align: right; }
        .user .bubble { background: #007bff; color: white; }
        .bot .bubble { background: #e9ecef; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>

    <div id="msgsEl"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type or speak a question...">
        <button id="voiceBtn">🎙️</button>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

<script>
    const msgInput = document.getElementById('msgInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const msgsEl = document.getElementById('msgsEl');

    // 1. Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        voiceBtn.onclick = () => {
            recognition.start();
            voiceBtn.textContent = '🔴';
        };
        recognition.onresult = (event) => {
            msgInput.value = event.results[0][0].transcript;
            voiceBtn.textContent = '🎙️';
        };
    }

    // 2. Speech Synthesis
    function speakBotResponse(text) {
        const synth = window.speechSynthesis;
        const cleanText = text.replace(/<\/?[^>]+(>|$)/g, ""); 
        const utterance = new SpeechSynthesisUtterance(cleanText);
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Aria') || v.name.includes('Female'));
        if (femaleVoice) utterance.voice = femaleVoice;
        synth.speak(utterance);
    }

    // 3. Main Logic
    async function sendMessage() {
        const question = msgInput.value.trim();
        if (!question) return;

        addMsg(question, 'user');
        msgInput.value = '';

        try {
            const url = `https://ecupirate99-n8n-free.hf.space/webhook/93778624-c756-4133-b169-6768f49dd513?query=${encodeURIComponent(question)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            addMsg(data.output, 'bot');
            speakBotResponse(data.output);
        } catch (e) {
            addMsg("Sorry, I'm having trouble connecting to the server.", 'bot');
        }
    }

    function addMsg(text, role) {
        const wrap = document.createElement('div');
        wrap.className = 'message ' + role;
        // Use innerHTML so the <b> and <br> tags from n8n work
        wrap.innerHTML = `<div class="bubble">${text}</div>`;
        msgsEl.appendChild(wrap);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }
</script>
</body>
</html>
